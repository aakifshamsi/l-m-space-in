name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: l-m-space-in/package-lock.json

      - name: Install dependencies
        working-directory: ./l-m-space-in
        run: npm ci

      - name: Type check
        working-directory: ./l-m-space-in
        run: npm run typecheck || true

      - name: Run tests
        working-directory: ./l-m-space-in
        run: npm test || true

      - name: Deploy to Cloudflare (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./l-m-space-in
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --env production

      - name: Deploy to Cloudflare (Preview)
        if: github.event_name == 'pull_request'
        working-directory: ./l-m-space-in
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy --env production --preview

      - name: Upload D1 migrations
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./l-m-space-in
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Apply migrations to production D1
          npx wrangler d1 execute l-m-space-in-prod --file=migrations/001_initial.sql
          npx wrangler d1 execute l-m-space-in-prod --file=migrations/002_seed_admin.sql
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./l-m-space-in
        run: npm ci

      - name: Run type check
        working-directory: ./l-m-space-in
        run: npm run typecheck